name: KEPCO Crawl
run-name: "KEPCO Crawl (스레드 ${{ inputs.thread }})"

# 2중 제어 모델: 이 워크플로는 수동 dispatch 만 받는다.
# - API(/api/admin/crawl POST) 와 Worker(/api/reconcile) 와 크롤러(auto_continue) 가 dispatch 함
# - 과거의 '*/5 * * * *' cron 안전망은 제거됨 (유령 Job 부활 원인)
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'crawl_jobs ID (필수)'
        required: true
        type: string
      thread:
        description: '스레드 번호 (1/2/3/4/5)'
        required: true
        default: '1'
        type: string

jobs:
  # 선행: Supabase 마스터 테이블을 Actions Cache 에 준비
  prep_caches:
    uses: ./.github/workflows/prep_caches.yml
    secrets: inherit

  crawl:
    name: "수집기 ${{ matrix.thread }}"
    runs-on: ubuntu-latest
    timeout-minutes: 350
    needs: prep_caches   # prep 완료 후에만 시작

    concurrency:
      group: kepco-crawl-${{ matrix.thread }}
      cancel-in-progress: false

    strategy:
      fail-fast: false
      matrix:
        # inputs.thread 가 빈 문자열로 넘어오면 matrix 빈 배열 → 0 jobs → 영원 queued.
        # default '1' fallback 으로 최소한 1 job 은 생성되도록 보장.
        thread: ${{ fromJSON(format('[{0}]', inputs.thread || '1')) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      # prep_caches 가 업로드한 Cache 를 복원 (HIT 확정)
      - name: Restore bjd_master cache
        uses: ./.github/actions/cache-supabase-table
        with:
          table_name: bjd_master
          columns: bjd_code,sep_1,sep_2,sep_3,sep_4,sep_5
          supabase_url: ${{ secrets.SUPABASE_URL }}
          supabase_key: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Run crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          KAKAO_REST_KEY: ${{ secrets.KAKAO_REST_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          BJD_MASTER_CACHE_FILE: ${{ github.workspace }}/.cache/bjd_master.json
        run: cd crawler && python run_crawl.py --job-id=${{ inputs.job_id }} --thread=${{ matrix.thread }}
